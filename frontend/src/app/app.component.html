@if (showShell()) {
  <div class="app-shell">
    @if (!sidebarCollapsed() && isMobile()) {
      <button type="button" class="sidebar-backdrop" (click)="collapseSidebar()" aria-label="Fechar menu"></button>
    }

    @if (sidebarCollapsed()) {
      <button type="button" class="sidebar-fab" (click)="expandSidebar()" aria-label="Abrir menu">
        <span aria-hidden="true">☰</span>
      </button>
    }

    <div class="app-body">
      <aside class="app-sidebar" [class.is-collapsed]="sidebarCollapsed()">
        <div class="sidebar-header">
          <a routerLink="/dashboard" class="sidebar-brand" [class.is-hidden]="sidebarCollapsed()">
            <img src="/logo-FamilyMoney.png" alt="FamilyMoney" class="app-logo" />
          </a>

          <button
            type="button"
            class="sidebar-toggle"
            (click)="toggleSidebar()"
            [attr.aria-label]="sidebarCollapsed() ? 'Expandir menu' : 'Recolher menu'"
          >
            @if (sidebarCollapsed()) {
              <span aria-hidden="true">›</span>
            } @else {
              <span aria-hidden="true">‹</span>
            }
          </button>
        </div>

        <nav class="sidebar-nav" aria-label="Menu principal">
          <a
            routerLink="/dashboard"
            routerLinkActive="active"
            (click)="onNavClick()"
            [attr.title]="sidebarCollapsed() ? 'Início' : null"
          >
            <span class="nav-icon" aria-hidden="true">⌂</span>
            <span class="nav-label">Início</span>
          </a>
          <a
            routerLink="/entradas"
            routerLinkActive="active"
            (click)="onNavClick()"
            [attr.title]="sidebarCollapsed() ? 'Entradas' : null"
          >
            <span class="nav-icon" aria-hidden="true">+</span>
            <span class="nav-label">Entradas</span>
          </a>
          <a
            routerLink="/saidas"
            routerLinkActive="active"
            (click)="onNavClick()"
            [attr.title]="sidebarCollapsed() ? 'Saídas' : null"
          >
            <span class="nav-icon" aria-hidden="true">−</span>
            <span class="nav-label">Saídas</span>
          </a>
          <a
            routerLink="/perfil"
            routerLinkActive="active"
            (click)="onNavClick()"
            [attr.title]="sidebarCollapsed() ? 'Perfil' : null"
          >
            <span class="nav-icon" aria-hidden="true">◎</span>
            <span class="nav-label">Perfil</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-profile">
            <a
              routerLink="/perfil"
              routerLinkActive="active"
              class="app-avatar"
              aria-label="Abrir perfil"
              (click)="onNavClick()"
            >
              @if (profile.photoFor(usuarioId())) {
                <img [src]="profile.photoFor(usuarioId())" alt="Foto de perfil de {{ usuarioNome() }}" />
              } @else {
                {{ profile.initials(usuarioNome()) }}
              }
            </a>
            <p class="sidebar-user">{{ usuarioNome() }}</p>
          </div>

          <button
            type="button"
            class="logout-button"
            (click)="sair()"
            [attr.title]="sidebarCollapsed() ? 'Sair' : null"
          >
            <span class="nav-icon" aria-hidden="true">⎋</span>
            <span class="nav-label">Sair</span>
          </button>
        </div>
      </aside>

      <main class="app-main">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}
