<div class="page">
  <header class="page-header">
    <a [routerLink]="voltarUrl" class="btn-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </a>
  </header>

  <div class="form-card" [class.form-card--saida]="tipo() === 'saida'">
    <div class="form-badge" [class.form-badge--saida]="tipo() === 'saida'">
      @if (tipo() === 'entrada') {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
      }
    </div>

    <h1 class="form-title">{{ titulo }}</h1>

    <form class="form" (ngSubmit)="salvar()">
      <div class="field">
        <label class="label" for="descricao">Descrição</label>
        <input
          id="descricao"
          class="input"
          type="text"
          placeholder="Ex: Salário, Internet, Supermercado..."
          [(ngModel)]="descricao"
          name="descricao"
          autocomplete="off"
          [disabled]="salvando()"
        />
      </div>

      <div class="field">
        <label class="label" for="valor">Valor (R$)</label>
        <input
          id="valor"
          class="input"
          type="text"
          inputmode="decimal"
          placeholder="0,00"
          [(ngModel)]="valor"
          name="valor"
          autocomplete="off"
          [disabled]="salvando()"
        />
      </div>

      <div class="field">
        <label class="label" for="data">Data</label>
        <input
          id="data"
          class="input"
          type="date"
          [(ngModel)]="data"
          name="data"
          [disabled]="salvando()"
        />
      </div>

      @if (erro()) {
        <p class="form-erro" role="alert">{{ erro() }}</p>
      }

      <button
        class="btn-submit"
        type="submit"
        [class.btn-submit--saida]="tipo() === 'saida'"
        [disabled]="salvando()"
      >
        {{ salvando() ? 'Salvando...' : 'Salvar Lançamento' }}
      </button>
    </form>
  </div>
</div>
