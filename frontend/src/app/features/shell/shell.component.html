<div class="shell" [class.sidebar-collapsed]="sidebarCollapsed()">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a routerLink="/dashboard" class="sidebar-brand">
        <img
          [src]="sidebarCollapsed() ? '/logo-2.png' : '/logo-FamilyMoney.png'"
          alt="Family Money"
          class="sidebar-logo"
        />
      </a>
      <button
        type="button"
        class="sidebar-toggle"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarCollapsed() ? 'Abrir menu lateral' : 'Minimizar menu lateral'"
        [attr.aria-expanded]="!sidebarCollapsed()"
        [attr.title]="sidebarCollapsed() ? 'Abrir menu' : 'Minimizar menu'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path [attr.d]="sidebarCollapsed() ? 'M9 6l6 6-6 6' : 'M15 6l-6 6 6 6'" />
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        class="nav-link"
        [attr.title]="sidebarCollapsed() ? 'Dashboard' : null"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a
        routerLink="/entradas"
        routerLinkActive="active"
        class="nav-link"
        [attr.title]="sidebarCollapsed() ? 'Entradas' : null"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
        <span class="nav-label">Entradas</span>
      </a>
      <a
        routerLink="/saidas"
        routerLinkActive="active"
        class="nav-link"
        [attr.title]="sidebarCollapsed() ? 'Saídas' : null"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
        <span class="nav-label">Saídas</span>
      </a>
      <a
        routerLink="/bancos"
        routerLinkActive="active"
        class="nav-link"
        [attr.title]="sidebarCollapsed() ? 'Bancos' : null"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10h18"/>
          <path d="M5 10V8l7-4 7 4v2"/>
          <path d="M6 10v7"/>
          <path d="M10 10v7"/>
          <path d="M14 10v7"/>
          <path d="M18 10v7"/>
          <path d="M3 20h18"/>
        </svg>
        <span class="nav-label">Bancos</span>
      </a>
      <a
        routerLink="/configuracoes"
        routerLinkActive="active"
        class="nav-link"
        [attr.title]="sidebarCollapsed() ? 'Configurações' : null"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.06a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.06a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.06a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="nav-label">Configurações</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/configuracoes" class="sidebar-user" [attr.title]="sidebarCollapsed() ? nomeCompleto() : null">
        @if (auth.usuario()?.fotoUrl) {
          <img [src]="auth.usuario()?.fotoUrl" alt="Foto do usuário" class="sidebar-avatar sidebar-avatar-img" />
        } @else {
          <div class="sidebar-avatar">{{ inicialUsuario() }}</div>
        }
        <span class="sidebar-username">{{ nomeCompleto() }}</span>
      </a>
      <button class="sidebar-logout" (click)="sair()" title="Sair da conta">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <main class="shell-content">
    <router-outlet />
  </main>

  <nav class="bottom-nav" aria-label="Navegação principal">
    <a routerLink="/dashboard" routerLinkActive="bottom-active" class="bottom-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Início</span>
    </a>
    <a routerLink="/entradas" routerLinkActive="bottom-active" class="bottom-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
      <span>Entradas</span>
    </a>
    <a routerLink="/saidas" routerLinkActive="bottom-active" class="bottom-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="19 12 12 19 5 12"/>
      </svg>
      <span>Saídas</span>
    </a>
    <a routerLink="/bancos" routerLinkActive="bottom-active" class="bottom-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10h18"/>
        <path d="M5 10V8l7-4 7 4v2"/>
        <path d="M6 10v7"/>
        <path d="M10 10v7"/>
        <path d="M14 10v7"/>
        <path d="M18 10v7"/>
        <path d="M3 20h18"/>
      </svg>
      <span>Bancos</span>
    </a>
    <a routerLink="/configuracoes" routerLinkActive="bottom-active" class="bottom-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.06a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.06a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.06a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      <span>Config</span>
    </a>
  </nav>
</div>
