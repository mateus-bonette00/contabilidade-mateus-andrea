<main class="login-page">
  <section class="login-card" aria-label="Acesso e cadastro">
    <div class="login-card-content">
      <img src="/logo-FamilyMoney.png" alt="FamilyMoney" class="login-logo" />

      <div class="switch-row" role="tablist" aria-label="Entrar ou cadastrar">
        <button
          type="button"
          class="switch-btn"
          [class.switch-btn--active]="modo() === 'login'"
          (click)="alternarModo('login')"
        >Entrar</button>
        <button
          type="button"
          class="switch-btn"
          [class.switch-btn--active]="modo() === 'cadastro'"
          (click)="alternarModo('cadastro')"
        >Cadastrar</button>
      </div>

      <h1 class="login-title">{{ titulo() }}</h1>
      <p class="login-subtitle">{{ subtitulo() }}</p>

      @if (modo() === 'login') {
        <form class="login-form" (ngSubmit)="entrar()">
          <div class="pin-row" role="group" aria-label="Campos do PIN">
            @for (digit of digits(); track $index) {
              <input
                #pinInput
                class="pin-box"
                type="password"
                inputmode="numeric"
                maxlength="1"
                autocomplete="off"
                [value]="digit"
                [attr.aria-label]="'Dígito ' + ($index + 1)"
                (input)="onDigitInput($index, $event)"
                (keydown)="onDigitKeydown($index, $event)"
                (paste)="onPaste($event)"
              />
            }
          </div>

          @if (errorMessage()) {
            <p class="login-error" role="alert">{{ errorMessage() }}</p>
          }

          <button type="submit" class="login-button" [disabled]="loading()">
            {{ loading() ? 'Entrando...' : 'Entrar na Conta' }}
          </button>
        </form>
      } @else {
        <form class="cadastro-form" (ngSubmit)="cadastrar()">
          <label class="field">
            <span>Nome</span>
            <input
              type="text"
              [value]="nomeCadastro()"
              (input)="nomeCadastro.set($any($event.target).value)"
              autocomplete="given-name"
              maxlength="100"
            />
          </label>

          <label class="field">
            <span>Sobrenome</span>
            <input
              type="text"
              [value]="sobrenomeCadastro()"
              (input)="sobrenomeCadastro.set($any($event.target).value)"
              autocomplete="family-name"
              maxlength="100"
            />
          </label>

          <label class="field">
            <span>E-mail</span>
            <input
              type="email"
              [value]="emailCadastro()"
              (input)="emailCadastro.set($any($event.target).value)"
              autocomplete="email"
              maxlength="160"
            />
          </label>

          <div class="field-grid">
            <label class="field">
              <span>PIN (4 números)</span>
              <input
                type="password"
                inputmode="numeric"
                maxlength="4"
                [value]="pinCadastro()"
                (input)="atualizarPinCadastro($any($event.target).value)"
                autocomplete="new-password"
              />
            </label>

            <label class="field">
              <span>Confirmar PIN</span>
              <input
                type="password"
                inputmode="numeric"
                maxlength="4"
                [value]="pinConfirmacaoCadastro()"
                (input)="atualizarPinConfirmacaoCadastro($any($event.target).value)"
                autocomplete="new-password"
              />
            </label>
          </div>

          @if (errorMessage()) {
            <p class="login-error" role="alert">{{ errorMessage() }}</p>
          }

          <button type="submit" class="login-button" [disabled]="loading()">
            {{ loading() ? 'Criando conta...' : 'Criar Conta' }}
          </button>
        </form>
      }
    </div>
  </section>
</main>
